name: DroneWatch

options:
  minimumXcodeGenVersion: 2.40.0
  deploymentTarget:
    iOS: "15.0"

targets:
  DroneWatch:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: DroneWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fi.dronewatch
        INFOPLIST_FILE: DroneWatch/Info.plist
        SWIFT_VERSION: 5.0
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        CODE_SIGN_STYLE: Automatic
